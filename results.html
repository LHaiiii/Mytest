<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh sách món ăn - Sinh nhật</title>
    <!-- Google Fonts for Hand-drawn / Sketch manual style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="card">
        <p class="eyebrow">Bảng vàng ăn uống 🏆</p>
        <h1>Ai muốn ăn món gì nè?</h1>
        <p class="subtitle">
          Danh sách món do đám bạn thân đã gửi để cùng ăn mừng sinh nhật.
        </p>

        <div id="passcodeGate" class="field-group">
          <label for="passcodeInput">Nhập mật khẩu để xem kết quả</label>
          <input id="passcodeInput" type="password" placeholder="Mật khẩu bí mật của bạn" autocomplete="off" />
          <button type="button" id="passcodeSubmit" class="submit-button" style="margin-top: 12px;">Xem kết quả</button>
          <p id="passcodeMessage" class="message" aria-live="polite"></p>
        </div>

        <div id="resultsSection" hidden>
          <div class="table-scroll-wrapper">
            <table class="results-table">
              <thead>
                <tr>
                  <th>Người gửi 👤</th>
                  <th>Món đã chọn 🍕</th>
                  <th>Thời gian ⏰</th>
                </tr>
              </thead>
              <tbody id="resultsBody"></tbody>
            </table>
          </div>

          <div class="results-link-wrapper" style="margin-top: 24px;">
            <a href="index.html" class="results-link">↩ Quay lại chọn món ngay thui!</a>
          </div>
        </div>
      </section>
    </main>
    <script>

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbygW8cFzc7_655aOj9cHiSjSp2j9n_blOGRLTsM30di_YZIQksuOwiq0lO34osnXoqd/exec';

      const passcodeGate = document.getElementById('passcodeGate');
      const passcodeInput = document.getElementById('passcodeInput');
      const passcodeSubmit = document.getElementById('passcodeSubmit');
      const passcodeMessage = document.getElementById('passcodeMessage');
      const resultsSection = document.getElementById('resultsSection');

      const savedKey = sessionStorage.getItem('resultsPasscode');
      if (savedKey) {
        tryLoadResults(savedKey);
      }

      passcodeSubmit.addEventListener('click', () => {
        const key = passcodeInput.value.trim();
        if (!key) {
          passcodeMessage.textContent = 'Bạn nhập mật khẩu đã nhé.';
          passcodeMessage.className = 'message error';
          return;
        }
        tryLoadResults(key);
      });

      passcodeInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          passcodeSubmit.click();
        }
      });

      async function tryLoadResults(key) {
        passcodeMessage.textContent = 'Đang kiểm tra...';
        passcodeMessage.className = 'message';

        const url = `${APPS_SCRIPT_URL}?key=${encodeURIComponent(key)}`;

        try {
          const response = await fetch(url);
          if (!response.ok) {
            throw new Error(`Server trả về lỗi ${response.status}`);
          }

          const data = await response.json();

          if (!data.ok) {
            sessionStorage.removeItem('resultsPasscode');
            passcodeMessage.textContent = data.message || 'Sai mật khẩu, bạn thử lại nhé.';
            passcodeMessage.className = 'message error';
            return;
          }

          sessionStorage.setItem('resultsPasscode', key);
          passcodeGate.hidden = true;
          resultsSection.hidden = false;
          renderResults(data.rows || []);
        } catch (error) {
          passcodeMessage.textContent = 'Không kiểm tra được lúc này: ' + error.message;
          passcodeMessage.className = 'message error';
        }
      }

      function renderResults(rows) {
        const tbody = document.getElementById('resultsBody');

        if (!rows.length) {
          tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; padding: 20px;">Chưa có ai chọn cả, bạn mở bát đi! 🍽️</td></tr>';
          return;
        }
        tbody.innerHTML = rows.map((row) => {
          let formattedTime = '';
          try {
            if (row.timestamp) {
              const d = new Date(row.timestamp);
              formattedTime = d.toLocaleDateString('vi-VN', {
                month: 'numeric',
                day: 'numeric'
              }) + ' ' + d.toLocaleTimeString('vi-VN', {
                hour: '2-digit',
                minute: '2-digit'
              });
            }
          } catch (e) {
            formattedTime = row.timestamp || '';
          }

          return `
            <tr>
              <td style="font-weight: 600; color: #163226;">${escapeHtml(row.sender || 'Ẩn danh 🤫')}</td>
              <td><span class="món-highlight">${(row.selectedFoods || []).map(escapeHtml).map(food => `<span>${food}</span>`).join('')}</span></td>
              <td style="font-size: 0.85rem; color: #6c7a75;">${escapeHtml(formattedTime)}</td>
            </tr>
          `;
        }).join('');
      }
    </script>
  </body>
</html>
