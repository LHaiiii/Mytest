<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh sách món ăn - Sinh nhật</title>
    <!-- Google Fonts for Hand-drawn / Sketch manual style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="card">
        <p class="eyebrow">Bảng vàng ăn uống 🏆</p>
        <h1>Ai muốn ăn món gì nè?</h1>
        <p class="subtitle">
          Danh sách món do đám bạn thân đã gửi để cùng ăn mừng sinh nhật.
        </p>

        <div class="table-scroll-wrapper">
          <table class="results-table">
            <thead>
              <tr>
                <th>Người gửi 👤</th>
                <th>Món đã chọn 🍕</th>
                <th>Thời gian ⏰</th>
              </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>

        <div class="results-link-wrapper" style="margin-top: 24px;">
          <a href="/index.html" class="results-link">↩ Quay lại chọn món ngay thui!</a>
        </div>
      </section>
    </main>
    <script>
      // FIX: rows from the server can contain a "sender" name or a custom
      // food item that the original survey page let a visitor type freely
      // (see script.js). Anything user-supplied must be escaped before it
      // goes into innerHTML, otherwise a value like
      // "<img src=x onerror=alert(1)>" typed as a food name would execute
      // as real HTML/JS on this results page. escapeHtml() neutralizes the
      // characters that matter for that: & < > " '
      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      // Dùng endpoint cục bộ trên server Node.js / Express
      const RESULTS_URL = '/results';

      async function loadResults() {
        const tbody = document.getElementById('resultsBody');
        const resultUrl = RESULTS_URL;

        try {
          const response = await fetch(resultUrl);

          if (!response.ok) {
            throw new Error(`Server trả về lỗi ${response.status}`);
          }

          const rows = await response.json();

          if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; padding: 20px;">Chưa có ai chọn cả, bạn mở bát đi! 🍽️</td></tr>';
            return;
          }

          // FIX: every field that can contain free-typed user input is
          // passed through escapeHtml() before being inserted.
          tbody.innerHTML = rows.map((row) => {
            let formattedTime = '';
            try {
              if (row.timestamp) {
                const d = new Date(row.timestamp);
                formattedTime = d.toLocaleDateString('vi-VN', {
                  month: 'numeric',
                  day: 'numeric'
                }) + ' ' + d.toLocaleTimeString('vi-VN', {
                  hour: '2-digit',
                  minute: '2-digit'
                });
              }
            } catch (e) {
              formattedTime = row.timestamp || '';
            }

            return `
              <tr>
                <td style="font-weight: 600; color: #163226;">${escapeHtml(row.sender || 'Ẩn danh 🤫')}</td>
                <td><span class="món-highlight">${(row.selectedFoods || []).map(escapeHtml).map(food => `<span>${food}</span>`).join('')}</span></td>
                <td style="font-size: 0.85rem; color: #6c7a75;">${escapeHtml(formattedTime)}</td>
              </tr>
            `;
          }).join('');
        } catch (error) {
          // FIX: previously a failed fetch (server down, CORS, bad JSON,
          // non-2xx status) threw silently into the console and the table
          // just stayed empty with no explanation. Now the user sees why.
          tbody.innerHTML = `<tr><td colspan="3" class="load-error">Không tải được dữ liệu: ${escapeHtml(error.message)}</td></tr>`;
        }
      }

      loadResults();
    </script>
  </body>
</html>
