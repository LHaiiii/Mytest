<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Food Results</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4fbf9;
        margin: 0;
        padding: 24px;
      }
      .container {
        max-width: 900px;
        margin: auto;
        background: #fff;
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th, td {
        border: 1px solid #d8ebe3;
        padding: 10px;
        text-align: left;
      }
      th {
        background: #e1f5ee;
      }
      h1 {
        color: #417b63;
      }
      .load-error {
        color: #b23b3b;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Danh sách món đã được chọn</h1>
      <table>
        <thead>
          <tr>
            <th>Người gửi</th>
            <th>Món đã chọn</th>
            <th>Thời gian</th>
            <th>Nguồn</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
    <script>
      // FIX: rows from the server can contain a "sender" name or a custom
      // food item that the original survey page let a visitor type freely
      // (see script.js). Anything user-supplied must be escaped before it
      // goes into innerHTML, otherwise a value like
      // "<img src=x onerror=alert(1)>" typed as a food name would execute
      // as real HTML/JS on this results page. escapeHtml() neutralizes the
      // characters that matter for that: & < > " '
      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      // Dùng CHÍNH XÁC cùng 1 URL Web App bạn dán trong script.js.
      // Apps Script tự biết trả kết quả (doGet) vì đây là request GET.
      const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbygW8cFzc7_655aOj9cHiSjSp2j9n_blOGRLTsM30di_YZIQksuOwiq0lO34osnXoqd/exec';

      async function loadResults() {
        const tbody = document.getElementById('resultsBody');
        const resultUrl = APPS_SCRIPT_URL;

        try {
          const response = await fetch(resultUrl);

          if (!response.ok) {
            throw new Error(`Server trả về lỗi ${response.status}`);
          }

          const rows = await response.json();

          if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="4">Chưa có dữ liệu nào.</td></tr>';
            return;
          }

          // FIX: every field that can contain free-typed user input is
          // passed through escapeHtml() before being inserted.
          tbody.innerHTML = rows.map((row) => `
            <tr>
              <td>${escapeHtml(row.sender || 'Không có tên')}</td>
              <td>${(row.selectedFoods || []).map(escapeHtml).join(', ')}</td>
              <td>${escapeHtml(row.timestamp || '')}</td>
              <td>${escapeHtml(row.source || '')}</td>
            </tr>
          `).join('');
        } catch (error) {
          // FIX: previously a failed fetch (server down, CORS, bad JSON,
          // non-2xx status) threw silently into the console and the table
          // just stayed empty with no explanation. Now the user sees why.
          tbody.innerHTML = `<tr><td colspan="4" class="load-error">Không tải được dữ liệu: ${escapeHtml(error.message)}</td></tr>`;
        }
      }

      loadResults();
    </script>
  </body>
</html>
